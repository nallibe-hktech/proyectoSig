<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F4E78"/>
      <stop offset="50%" stop-color="#163A52"/>
      <stop offset="100%" stop-color="#0D2A3E"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F4E78"/>
      <stop offset="100%" stop-color="#2E5C8A"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="0" dy="0"/>
      <feComposite in2="SourceGraphic"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="inputFocus" x="-5%" y="-20%" width="110%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#1F4E78" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>

  <!-- Decorative geometric shapes -->
  <circle cx="200" cy="150" r="200" fill="rgba(112,173,71,0.06)"/>
  <circle cx="1300" cy="700" r="250" fill="rgba(46,92,138,0.15)"/>
  <circle cx="1400" cy="100" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="800" r="120" fill="rgba(112,173,71,0.04)"/>

  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Left side branding -->
  <text x="180" y="380" font-size="52" fill="rgba(255,255,255,0.08)" font-weight="900" transform="rotate(-15, 180, 380)">SIG</text>
  <text x="120" y="500" font-size="28" fill="rgba(255,255,255,0.06)" font-weight="700" transform="rotate(-15, 120, 500)">PLATAFORMA</text>
  <text x="80" y="580" font-size="18" fill="rgba(255,255,255,0.05)" font-weight="400" transform="rotate(-15, 80, 580)">INTEGRAL</text>

  <!-- Company info left -->
  <text x="100" y="200" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="700" letter-spacing="3">h&amp;k consulting</text>
  <text x="100" y="226" font-size="36" fill="white" font-weight="800">Plataforma</text>
  <text x="100" y="268" font-size="36" fill="#70AD47" font-weight="800">Operativa SIG</text>
  <text x="100" y="316" font-size="14" fill="rgba(255,255,255,0.5)" font-weight="400">Sistema Integrado de Gestión · ES</text>

  <!-- Feature pills -->
  <rect x="100" y="360" width="200" height="32" rx="16" fill="rgba(112,173,71,0.2)" stroke="rgba(112,173,71,0.4)" stroke-width="1"/>
  <text x="200" y="381" font-size="12" fill="#70AD47" text-anchor="middle" font-weight="600">✅ Cierres automatizados</text>

  <rect x="100" y="402" width="210" height="32" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="205" y="423" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">🔗 9 sistemas integrados</text>

  <rect x="100" y="444" width="210" height="32" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="205" y="465" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">📊 Power BI en tiempo real</text>

  <rect x="100" y="486" width="200" height="32" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="200" y="507" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">🔒 Auditoría completa</text>

  <!-- ─── LOGIN CARD ─── -->
  <rect x="830" y="80" width="500" height="720" rx="20" fill="url(#cardGrad)" filter="url(#cardShadow)"/>

  <!-- Card header accent -->
  <rect x="830" y="80" width="500" height="8" rx="20" fill="#70AD47"/>
  <rect x="830" y="88" width="500" height="14" rx="0" fill="white"/>

  <!-- Logo in card -->
  <circle cx="1080" cy="170" r="50" fill="#1F4E78"/>
  <circle cx="1080" cy="170" r="38" fill="#163A52"/>
  <text x="1080" y="165" font-size="26" fill="#70AD47" text-anchor="middle" font-weight="900">SIG</text>
  <text x="1080" y="184" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">PLATFORM</text>

  <!-- Card title -->
  <text x="1080" y="250" font-size="26" fill="#1F4E78" text-anchor="middle" font-weight="700">Iniciar Sesión</text>
  <text x="1080" y="274" font-size="13" fill="#999" text-anchor="middle">Accede a tu plataforma operativa</text>

  <!-- Divider -->
  <line x1="870" y1="294" x2="1290" y2="294" stroke="#EEF2F7" stroke-width="1"/>

  <!-- Email field -->
  <text x="870" y="325" font-size="12" fill="#666" font-weight="700">EMAIL CORPORATIVO</text>
  <rect x="862" y="332" width="436" height="48" rx="10" fill="white" stroke="#1F4E78" stroke-width="2" filter="url(#inputFocus)"/>
  <text x="885" y="362" font-size="14" fill="#1A1A1A">juan.perez@sigeurope.com</text>
  <text x="1275" y="362" font-size="16" fill="#1F4E78">✉</text>

  <!-- Password field -->
  <text x="870" y="405" font-size="12" fill="#666" font-weight="700">CONTRASEÑA</text>
  <rect x="862" y="412" width="436" height="48" rx="10" fill="white" stroke="#D0D0D0" stroke-width="1.5"/>
  <text x="885" y="442" font-size="18" fill="#444" letter-spacing="4">••••••••••</text>
  <text x="1275" y="442" font-size="14" fill="#888">👁</text>

  <!-- Remember me -->
  <rect x="862" y="476" width="18" height="18" rx="4" fill="#1F4E78"/>
  <text x="871" y="490" font-size="12" fill="white" text-anchor="middle" font-weight="700">✓</text>
  <text x="892" y="490" font-size="13" fill="#444">Recordar sesión</text>
  <text x="1250" y="490" font-size="13" fill="#1F4E78">¿Olvidaste tu contraseña?</text>

  <!-- Login button -->
  <rect x="862" y="512" width="436" height="52" rx="12" fill="url(#btnGrad)" filter="url(#inputFocus)"/>
  <text x="1080" y="543" font-size="16" fill="white" text-anchor="middle" font-weight="700">→  Acceder al Sistema</text>

  <!-- Divider -->
  <line x1="862" y1="584" x2="1000" y2="584" stroke="#E8EEF5" stroke-width="1"/>
  <text x="1080" y="589" font-size="12" fill="#BBB" text-anchor="middle">o continuar con</text>
  <line x1="1160" y1="584" x2="1298" y2="584" stroke="#E8EEF5" stroke-width="1"/>

  <!-- Azure AD button -->
  <rect x="862" y="600" width="436" height="48" rx="10" fill="white" stroke="#D0D0D0" stroke-width="1.5"/>
  <text x="892" y="630" font-size="14" fill="#0078D4">⬛</text>
  <text x="1080" y="630" font-size="14" fill="#444" text-anchor="middle" font-weight="500">Microsoft / Azure AD (SSO)</text>

  <!-- Version info -->
  <text x="1080" y="680" font-size="11" fill="#BBB" text-anchor="middle">SIG-ES Platform v1.0 · h&amp;k consulting</text>
  <text x="1080" y="698" font-size="10" fill="#DDD" text-anchor="middle">© 2026 · Todos los derechos reservados</text>

  <!-- Roles info -->
  <rect x="862" y="718" width="436" height="62" rx="10" fill="#F8FAFC" stroke="#E8EEF5" stroke-width="1"/>
  <text x="1080" y="737" font-size="11" fill="#888" text-anchor="middle" font-weight="700">ROLES DISPONIBLES</text>
  <text x="1080" y="758" font-size="11" fill="#666" text-anchor="middle">Administrador · Gestor Proyecto · Backoffice · FICO · Dirección</text>
  <text x="1080" y="774" font-size="10" fill="#AAA" text-anchor="middle">Acceso según rol asignado por IT · Eladio/Silvia</text>

  <!-- Right side mini info -->
  <text x="1360" y="200" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">Celero ●</text>
  <text x="1360" y="220" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">Bizneo ●</text>
  <text x="1360" y="240" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">Intratime ●</text>
  <text x="1360" y="260" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">Payhawk ●</text>
  <text x="1380" y="180" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="end" letter-spacing="1">INTEGRACIONES</text>
</svg>
