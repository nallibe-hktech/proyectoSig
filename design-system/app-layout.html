<!-- ═══════════════════════════════════════════════════════════
     SIG-ES · App Shell — app.component.html
     Layout: sidebar fijo (168px) + main (header 56px + content)
     ═══════════════════════════════════════════════════════════ -->
<div class="sig-app" [class.detail-open]="detailPanelOpen">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <app-sidebar
    [currentModule]="currentModule"
    (navigate)="onNavigate($event)">
  </app-sidebar>

  <!-- ── Main area ─────────────────────────────────────────── -->
  <div class="sig-main">

    <!-- Top header -->
    <header class="sig-header">
      <div class="sig-header__left">
        <span class="sig-header__module">{{ moduleTitle }}</span>
        <span class="sig-breadcrumb" *ngIf="breadcrumb">
          <span class="sig-breadcrumb__sep">›</span>
          {{ breadcrumb }}
        </span>
      </div>
      <div class="sig-header__right">
        <button class="sig-btn sig-btn--icon" title="Notificaciones">
          <mat-icon>notifications_none</mat-icon>
          <span class="sig-header__notif-dot" *ngIf="hasNotifications"></span>
        </button>
        <div class="sig-avatar sig-avatar--header" [matMenuTriggerFor]="userMenu">
          {{ userInitials }}
        </div>
        <mat-menu #userMenu="matMenu" class="sig-user-menu">
          <button mat-menu-item routerLink="/admin/perfil">
            <mat-icon>person_outline</mat-icon> Mi perfil
          </button>
          <button mat-menu-item (click)="onLogout()">
            <mat-icon>logout</mat-icon> Cerrar sesión
          </button>
        </mat-menu>
      </div>
    </header>

    <!-- Page content -->
    <main class="sig-content">
      <router-outlet></router-outlet>
    </main>

  </div><!-- /sig-main -->

</div><!-- /sig-app -->
