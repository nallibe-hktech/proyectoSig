# ============================================================================
# Azure DevOps Pipeline — Plataforma Digital SIG (SIG ES)
# Entorno: DEV  |  Despliega al pulsar push sobre la rama 'dev'
#
# MODO SIN SERVICE CONNECTION (no requiere permisos de Microsoft Entra):
#   - API .NET 10      -> App Service  app-siges-api-dev   (zip deploy via Kudu)
#   - Frontend Angular -> Static Web App swa-siges-front-dev (deployment token)
#
# Migraciones EF Core: NO se aplican aqui (se ejecutan a mano).
#
# VARIABLES SECRETAS DEL PIPELINE (Edit > Variables, marcar "secret"):
#   1. KUDU_USER  -> usuario de publicacion del App Service (empieza por $)
#   2. KUDU_PASS  -> password de publicacion del App Service
#   3. SWA_DEPLOYMENT_TOKEN -> token de la Static Web App
# (KUDU_USER y KUDU_PASS salen de:
#  az webapp deployment list-publishing-credentials -g rg-siges-dev -n app-siges-api-dev)
# ============================================================================

trigger:
  branches:
    include:
      - dev

pool:
  vmImage: 'ubuntu-latest'

variables:
  appServiceName: 'app-siges-api-dev'
  dotnetVersion: '10.0.x'
  nodeVersion: '20.x'
  buildConfiguration: 'Release'

stages:
# ===========================================================================
# STAGE 1 — BACKEND (.NET 10 API)  — zip deploy via Kudu (sin Service Connection)
# ===========================================================================
- stage: Backend
  displayName: 'Build & Deploy API (.NET 10)'
  jobs:
  - job: BuildDeployApi
    displayName: 'Compilar y desplegar SIG.API'
    steps:
      - task: UseDotNet@2
        displayName: 'Instalar .NET SDK 10'
        inputs:
          packageType: 'sdk'
          version: '$(dotnetVersion)'

      - script: dotnet restore backend/SIG.API/SIG.API.csproj
        displayName: 'Restore'

      - script: dotnet publish backend/SIG.API/SIG.API.csproj -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/api
        displayName: 'Publish API'

      # Empaquetar el publish en un zip
      - script: |
          cd $(Build.ArtifactStagingDirectory)/api
          zip -r ../siges-api.zip .
        displayName: 'Empaquetar zip'

      # Desplegar el zip al App Service via Kudu zip deploy (usuario/pass de publicacion)
      - script: |
          curl -sS -X POST \
            -u "$(KUDU_USER):$(KUDU_PASS)" \
            --data-binary @"$(Build.ArtifactStagingDirectory)/siges-api.zip" \
            -H "Content-Type: application/zip" \
            "https://$(appServiceName).scm.azurewebsites.net/api/zipdeploy"
        displayName: 'Desplegar zip al App Service (Kudu)'

# ===========================================================================
# STAGE 2 — FRONTEND (Angular)  — deployment token
# ===========================================================================
- stage: Frontend
  displayName: 'Build & Deploy Front (Angular)'
  dependsOn: Backend
  jobs:
  - job: BuildDeployFront
    displayName: 'Compilar y desplegar Angular'
    steps:
      - task: NodeTool@0
        displayName: 'Instalar Node'
        inputs:
          versionSpec: '$(nodeVersion)'

      - script: |
          cd frontend
          npm ci
          npm run build -- --configuration production
        displayName: 'Build Angular (produccion)'

      - task: AzureStaticWebApp@0
        displayName: 'Desplegar a Static Web App'
        inputs:
          app_location: 'frontend/dist/frontend/browser'
          skip_app_build: true
          azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN)
