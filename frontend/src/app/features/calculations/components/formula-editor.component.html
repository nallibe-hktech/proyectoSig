<div class="formula-editor">
  <!-- ===== TOOLBAR (TOP) ===== -->
  <app-formula-canvas-toolbar
    [canUndo]="canUndoAction"
    [canRedo]="canRedoAction"
    [isFormulaValid]="isFormulaValid"
    (clearClicked)="onClear()"
    (loadJsonClicked)="onLoadJson()"
    (exportClicked)="onExport()"
    (undoClicked)="onUndo()"
    (redoClicked)="onRedo()"
  />

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="editor-container">
    <!-- LEFT SIDEBAR - PALETTE -->
    <app-formula-palette
      [items]="paletteItems"
      (itemDragStart)="onPaletteItemDragStart($event.item, $event.event)"
      (itemDragEnd)="onPaletteItemDragEnd()"
    />

    <!-- CENTER - CANVAS -->
    <app-formula-canvas
      #canvas
      [nodes]="nodes"
      [connections]="connections"
      [selectedNodeId]="selectedNodeId"
      [selectedConnectionId]="selectedConnectionId"
      [editorState]="currentState"
      (nodeSelected)="onNodeClick($event)"
      (nodeDoubleClicked)="onNodeDoubleClick($event)"
      (nodeDeleted)="onNodeDelete($event)"
      (canvasDropped)="onCanvasDrop($event)"
      (connectionSelected)="onConnectionSelected($event)"
      (canvasClicked)="onCanvasClicked()"
    />

    <!-- RIGHT SIDEBAR - INSPECTOR -->
    <app-formula-property-inspector
      [node]="selectedNode || null"
      [entities]="entities"
      [operations]="operations"
      (propertyChanged)="onPropertyChange($event.nodeId, $event.fieldName, $event.value)"
      (nodeDuplicated)="onNodeDuplicate($event)"
      (nodeDeleted)="onNodeDelete($event)"
    />
  </div>

  <!-- ===== JSON PREVIEW (BOTTOM) ===== -->
  <div class="json-preview" data-testid="formula-json-preview" *ngIf="exportedFormula">
    <div class="json-preview-header">
      <h4>JSON Preview</h4>
      <button
        mat-icon-button
        (click)="onCopyJson()"
        matTooltip="Copiar al portapapeles"
        [attr.data-testid]="'formula-json-copy-btn'"
      >
        <mat-icon>content_copy</mat-icon>
      </button>
    </div>
    <textarea readonly class="json-content">{{ getFormattedJson() }}</textarea>
  </div>

  <!-- ===== LOAD JSON DIALOG ===== -->
  <div class="dialog-overlay" *ngIf="showLoadJsonDialog" (click)="onCancelLoadJson()">
    <div class="dialog-content" (click)="$event.stopPropagation()">
      <h2>Importar Fórmula (JSON)</h2>

      <textarea
        [(ngModel)]="loadJsonInput"
        placeholder="Pega tu JSON aquí..."
        class="json-input"
      ></textarea>

      <div *ngIf="loadJsonError" class="error-message">
        {{ loadJsonError }}
      </div>

      <div class="dialog-actions">
        <button mat-stroked-button (click)="onCancelLoadJson()">Cancelar</button>
        <button mat-raised-button color="primary" (click)="onImportJson()">Importar</button>
      </div>
    </div>
  </div>
</div>
