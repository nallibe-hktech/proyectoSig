<mat-sidenav-container class="sig-shell-container">

  <mat-sidenav
    #sidenav
    class="sig-sidenav"
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="isMobile() ? false : sidenavOpen()"
    aria-label="Navegacion principal"
    data-testid="sidenav"
  >
    <div class="sig-sidenav-logo">
      <a routerLink="/dashboard" class="sig-sidebar-brand">
        <div class="sig-user-avatar">{{ userInitial() }}</div>
        <div class="sig-sidebar-brand-text">
          <span class="sig-sidebar-brand-name">SIG</span>
          <span class="sig-sidebar-brand-sub">Plataforma Integral</span>
        </div>
      </a>
    </div>

    <div class="sig-nav-group-label">Principal</div>
    <mat-nav-list>
      @for (item of operativoNav(); track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [attr.data-testid]="item.testId"
          [attr.aria-label]="item.label"
        >
          <mat-icon class="sig-nav-icon" aria-hidden="true">{{ item.icon }}</mat-icon>
          <span class="sig-nav-label">{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <mat-divider />

    <div class="sig-nav-group-label">Administracion</div>
    <mat-nav-list>
      @for (item of adminNav(); track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [attr.data-testid]="item.testId"
          [attr.aria-label]="item.label"
        >
          <mat-icon class="sig-nav-icon" aria-hidden="true">{{ item.icon }}</mat-icon>
          <span class="sig-nav-label">{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="sig-appbar" role="banner">
      <button mat-icon-button (click)="isMobile() ? sidenav.toggle() : toggleSidenav()" aria-label="Menu" data-testid="btn-menu">
        <mat-icon>{{ sidenavOpen() ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <a routerLink="/dashboard" class="sig-logo-mark" style="margin-left:8px;margin-right:16px;">
        <app-dashboard-design></app-dashboard-design>
      </a>
      <span class="sig-spacer"></span>
      <button mat-icon-button (click)="theme.toggle()"
        [attr.aria-label]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
        [matTooltip]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
        matTooltipPosition="below" style="margin-left:4px;" data-testid="btn-theme-toggle">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <span class="sig-appbar-user" data-testid="user-display">{{ userDisplay() }}</span>
      <button mat-icon-button [matMenuTriggerFor]="menuUsuario" aria-label="Menu usuario" style="margin-left:8px;" data-testid="btn-menu-usuario">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #menuUsuario="matMenu">
        <button mat-menu-item data-testid="menu-perfil"><mat-icon>person</mat-icon><span>Perfil</span></button>
        <mat-divider />
        <button mat-menu-item (click)="cerrarSesion()" data-testid="menu-logout"><mat-icon>logout</mat-icon><span>Cerrar sesion</span></button>
      </mat-menu>
    </mat-toolbar>
    <main id="main-content" class="sig-main-content"><router-outlet /></main>
  </mat-sidenav-content>
</mat-sidenav-container>
